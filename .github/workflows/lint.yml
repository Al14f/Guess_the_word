name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.13.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installiamo anche pygame qui, altrimenti i linter non possono analizzarlo
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements_dev.txt ]; then pip install -r requirements_dev.txt; fi
          # Se non sono nei file sopra, installiamo i tool di linting
          pip install pylint flake8 mypy black isort pygame 

      - name: Lint with pylint
        # Aggiunto il whitelist per pygame e ignorati gli spazi bianchi per ora se vuoi far passare il test
        run: pylint $(git ls-files '*.py') --extension-pkg-whitelist=pygame

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Lint with mypy
        # mypy ha bisogno di installare i "types" per pygame o ignorarli
        run: mypy $(git ls-files '*.py') --ignore-missing-imports

      - name: Check code formatting with black
        run: black --check --diff $(git ls-files '*.py')

      - name: Check code formatting with isort
        run: isort --check-only --diff $(git ls-files '*.py')